name = "nomnom-relay"
main = "src/worker.ts"
compatibility_date = "2025-05-01"

# Custom domain. Requires the zone (spencerjireh.com) to be on Cloudflare;
# Wrangler provisions the DNS record + SSL cert on deploy.
routes = [
  { pattern = "relay.spencerjireh.com", custom_domain = true },
]

# R2 bucket holds short-lived rendezvous payloads.
# Create with: npx wrangler r2 bucket create nomnom-relay
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "nomnom-relay"

# Per-feed SSE notifier. One Durable Object instance per feed (idFromName)
# holds open text/event-stream connections and pushes new-slot notifications,
# replacing the receivers' R2 long-poll with real push. No DO storage is used
# (connections are in-memory, the backlog comes from R2), but SQLite-backed
# classes are the supported default and work on every plan.
[[durable_objects.bindings]]
name = "FEED_NOTIFIER"
class_name = "FeedNotifier"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["FeedNotifier"]

# HMAC secret is set out-of-band. The fastest path is to let `nomnom relay init`
# generate it for you — it prints the exact `wrangler secret put` and
# `wrangler deploy` commands. Or generate one yourself, e.g.
#   python3 -c 'import secrets; print(secrets.token_urlsafe(9))' \
#     | npx wrangler secret put NOMNOM_HMAC_SECRET
#
# Do not check the secret into this file.
