name: tests

on:
  push:
    branches: [main]
  pull_request:

# All jobs only read the repo; scope the token to least privilege.
permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt
      - name: Run tests
        run: pytest -v

  relay-worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: relay-worker
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: relay-worker/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Run tests (vitest + workers pool)
        run: npm test

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nomnom-web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: nomnom-web/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Crypto interop vectors
        run: npm test
      - name: Build
        run: npm run build
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: E2E UI smoke (Playwright)
        run: npm run test:e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: nomnom-web/playwright-report/
          retention-days: 7
